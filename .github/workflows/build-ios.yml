name: Build iOS

on:
  workflow_call:
    secrets:
      APPLE_TEAM_ID:
        required: true
      IOS_DISTRIBUTION_CERTIFICATE_BASE64:
        required: true
      IOS_DISTRIBUTION_CERTIFICATE_PASSWORD:
        required: true
      IOS_PROVISIONING_PROFILE_UUID:
        required: true
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_API_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_PRIVATE_KEY:
        required: true

env:
  GODOT_VERSION: "4.6.3"
  EXPORT_NAME: "SweetVinegarGames"

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH"
          fi
          xcodebuild -version

      - name: Install Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip" -O godot.zip
          unzip -q godot.zip
          sudo cp -R Godot.app /Applications/
          sudo ln -sf /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

      - name: Setup export templates
        run: |
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          cp templates/* "$TEMPLATES_DIR/" 2>/dev/null || true

      - name: Inject iOS export preset
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Add iOS preset if not already present
          if ! grep -q 'platform="iOS"' export_presets.cfg; then
            cat >> export_presets.cfg << EOF

          [preset.1]

          name="iOS"
          platform="iOS"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="./build/ios/${EXPORT_NAME}.ipa"
          patches=PackedStringArray()
          patch_delta_encoding=false
          patch_delta_compression_level_zstd=19
          patch_delta_min_reduction=0.1
          patch_delta_include_filters="*"
          patch_delta_exclude_filters=""
          encryption_include_filters=""
          encryption_exclude_filters=""
          seed=0
          encrypt_pck=false
          encrypt_directory=false
          script_export_mode=2

          [preset.1.options]

          custom_template/debug=""
          custom_template/release=""
          application/app_store_team_id="${APPLE_TEAM_ID}"
          application/provisioning_profile_uuid_debug=""
          application/provisioning_profile_uuid_release=""
          application/bundle_identifier="com.sweetvinegar.games"
          application/signature=""
          application/short_version="1.0.0"
          application/version="1.0.0"
          application/icon_interpolation=4
          application/launch_screens_interpolation=4
          application/export_project_only=true
          application/min_ios_version="16.0"
          EOF
          fi

      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Import project
        run: |
          godot --headless --import 2>&1 || true
          godot --headless --import 2>&1 || true

      - name: Export Xcode project
        run: |
          mkdir -p build/ios
          godot --headless --export-debug "iOS" build/ios/${EXPORT_NAME}.ipa 2>&1 || true

      - name: Build with xcodebuild
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_UUID: ${{ secrets.IOS_PROVISIONING_PROFILE_UUID }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          # Find the generated xcodeproj
          PROJ_DIR=$(find build/ios -name "*.xcodeproj" -print -quit | xargs dirname)
          if [ -z "$PROJ_DIR" ]; then
            echo "ERROR: Could not find xcodeproj"
            find build/ios -type f | head -30
            exit 1
          fi
          echo "Found project in: $PROJ_DIR"

          # Write API key for provisioning updates
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          cd "$PROJ_DIR"
          xcodebuild -project ${EXPORT_NAME}.xcodeproj \
            -scheme ${EXPORT_NAME} \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/${EXPORT_NAME}.xcarchive \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="${PROVISIONING_PROFILE_UUID}" \
            archive

      - name: Export IPA
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          # Create ExportOptions.plist
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/${EXPORT_NAME}.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath build/ios/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath <(echo "$API_PRIVATE_KEY") \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" || true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/export/*.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
