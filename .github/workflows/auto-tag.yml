name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.3"
  EXPORT_NAME: "SweetVinegarGames"

jobs:
  tag:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      tagged: ${{ steps.check.outputs.tagged }}
      version: ${{ steps.check.outputs.version }}
      changelog: ${{ steps.changelog.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit message for release keywords
        id: check
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          # Match keywords: [release], [build], [deploy]
          # Optionally with version: [release v1.2.3]
          if echo "$MSG" | grep -qiE '\[(release|build|deploy)(\s+v?[0-9]+\.[0-9]+(\.[0-9]+)?)?\]'; then
            # Extract version if provided
            VERSION=$(echo "$MSG" | grep -oiE '\[(release|build|deploy)\s+v?([0-9]+\.[0-9]+(\.[0-9]+)?)\]' | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)

            if [ -z "$VERSION" ]; then
              # Auto-increment: find latest tag and bump patch
              LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
              if [ -z "$LATEST" ]; then
                VERSION="1.0.0"
              else
                # Strip 'v' prefix and increment patch
                CURRENT="${LATEST#v}"
                MAJOR=$(echo "$CURRENT" | cut -d. -f1)
                MINOR=$(echo "$CURRENT" | cut -d. -f2)
                PATCH=$(echo "$CURRENT" | cut -d. -f3)
                PATCH=$((PATCH + 1))
                VERSION="$MAJOR.$MINOR.$PATCH"
              fi
            fi

            echo "tagged=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Will create tag v$VERSION"
          else
            echo "tagged=false" >> $GITHUB_OUTPUT
            echo "No release keyword found, skipping"
          fi

      - name: Create and push tag
        if: steps.check.outputs.tagged == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.check.outputs.version }}" -m "Release v${{ steps.check.outputs.version }}"
          git push origin "v${{ steps.check.outputs.version }}"

      - name: Generate changelog
        id: changelog
        if: steps.check.outputs.tagged == 'true'
        run: |
          # Find previous tag
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "v${{ steps.check.outputs.version }}" | head -1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          echo "Gathering commits from $RANGE"

          # Collect feat: commits only (fixes excluded to reduce noise)
          FEATS=$(git log "$RANGE" --pretty=format:"%s" | grep -iE "^feat:" | sed 's/^[Ff]eat: *//' || true)

          # Build release notes
          NOTES=""
          if [ -n "$FEATS" ]; then
            NOTES+="## ✨ New Features"$'\n'
            while IFS= read -r line; do
              NOTES+="- $line"$'\n'
            done <<< "$FEATS"
            NOTES+=$'\n'
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Maintenance release v${{ steps.check.outputs.version }}"
          fi

          # Write to file for multi-line output
          echo "$NOTES" > "$RUNNER_TEMP/release_notes.md"

          # Pass as output using delimiter
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT

  build-android:
    needs: tag
    if: needs.tag.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          # The container HOME may differ from /root — use $HOME
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATES_DIR"
          # barichello/godot-ci stores templates in /root, but HOME might be /github/home
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ] && [ "$HOME" != "/root" ]; then
            cp -r /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable/* "$TEMPLATES_DIR/" 2>/dev/null || true
          fi
          echo "Templates directory contents:"
          ls -la "$TEMPLATES_DIR/" || echo "Empty or missing"

      - name: Setup keystore and editor settings
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > $HOME/release.keystore
          mkdir -p $HOME/.config/godot

          # Find Java SDK path
          JAVA_HOME_PATH=$(find /usr -name "javac" -type f 2>/dev/null | head -1 | sed 's|/bin/javac||')
          if [ -z "$JAVA_HOME_PATH" ]; then
            JAVA_HOME_PATH="/usr/lib/jvm/java-17-openjdk-amd64"
          fi
          echo "Java home: $JAVA_HOME_PATH"

          # Find Android SDK
          ANDROID_SDK="/usr/lib/android-sdk"
          if [ ! -d "$ANDROID_SDK" ]; then
            ANDROID_SDK="${ANDROID_HOME:-/usr/lib/android-sdk}"
          fi
          echo "Android SDK: $ANDROID_SDK"

          printf '[gd_resource type="EditorSettings"]\n[resource]\n' > $HOME/.config/godot/editor_settings-4.tres
          printf 'export/android/android_sdk_path = "%s"\n' "$ANDROID_SDK" >> $HOME/.config/godot/editor_settings-4.tres
          printf 'export/android/java_sdk_path = "%s"\n' "$JAVA_HOME_PATH" >> $HOME/.config/godot/editor_settings-4.tres
          printf 'export/android/debug_keystore = "%s/release.keystore"\n' "$HOME" >> $HOME/.config/godot/editor_settings-4.tres
          printf 'export/android/debug_keystore_user = "%s"\n' "$KEYSTORE_ALIAS" >> $HOME/.config/godot/editor_settings-4.tres
          printf 'export/android/debug_keystore_pass = "%s"\n' "$KEYSTORE_PASSWORD" >> $HOME/.config/godot/editor_settings-4.tres
          printf 'export/android/keystore/release = "%s/release.keystore"\n' "$HOME" >> $HOME/.config/godot/editor_settings-4.tres
          printf 'export/android/keystore/release_user = "%s"\n' "$KEYSTORE_ALIAS" >> $HOME/.config/godot/editor_settings-4.tres
          printf 'export/android/keystore/release_password = "%s"\n' "$KEYSTORE_PASSWORD" >> $HOME/.config/godot/editor_settings-4.tres
          echo "Editor settings written"

      - name: Import project
        run: |
          cd $GITHUB_WORKSPACE
          godot --headless --import 2>&1 || true
          godot --headless --import 2>&1 || true

      - name: Build APK
        run: |
          mkdir -p $GITHUB_WORKSPACE/build/android
          cd $GITHUB_WORKSPACE
          godot --headless --export-release "Android" build/android/${EXPORT_NAME}.apk 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: needs.tag.outputs.tagged == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.tag.outputs.version }}
          name: "${{ env.EXPORT_NAME }} v${{ needs.tag.outputs.version }}"
          body: "${{ needs.tag.outputs.changelog }}"
          files: build/android/${{ env.EXPORT_NAME }}.apk
          draft: false
          prerelease: false

  build-windows:
    needs: [tag, build-android]
    if: needs.tag.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATES_DIR"
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ] && [ "$HOME" != "/root" ]; then
            cp -r /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable/* "$TEMPLATES_DIR/" 2>/dev/null || true
          fi

      - name: Import project
        run: |
          cd $GITHUB_WORKSPACE
          godot --headless --import 2>&1 || true
          godot --headless --import 2>&1 || true

      - name: Build Windows exe
        run: |
          mkdir -p $GITHUB_WORKSPACE/build/windows
          cd $GITHUB_WORKSPACE
          godot --headless --export-release "Windows Desktop" build/windows/${EXPORT_NAME}.exe 2>&1

      - name: Zip Windows build
        run: |
          cd $GITHUB_WORKSPACE/build/windows
          zip -r $GITHUB_WORKSPACE/build/${EXPORT_NAME}-Windows.zip .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build/${{ env.EXPORT_NAME }}-Windows.zip
          retention-days: 30

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.tag.outputs.version }}
          files: build/${{ env.EXPORT_NAME }}-Windows.zip

  build-ios:
    needs: tag
    if: needs.tag.outputs.tagged == 'true'
    uses: ./.github/workflows/build-ios.yml
    secrets:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
      IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_UUID: ${{ secrets.IOS_PROVISIONING_PROFILE_UUID }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
