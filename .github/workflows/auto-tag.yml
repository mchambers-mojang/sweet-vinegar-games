name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.3"
  EXPORT_NAME: "SweetVinegarGames"

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tagged: ${{ steps.check.outputs.tagged }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit message for release keywords
        id: check
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          # Match keywords: [release], [build], [deploy]
          # Optionally with version: [release v1.2.3]
          if echo "$MSG" | grep -qiE '\[(release|build|deploy)(\s+v?[0-9]+\.[0-9]+(\.[0-9]+)?)?\]'; then
            # Extract version if provided
            VERSION=$(echo "$MSG" | grep -oiE '\[(release|build|deploy)\s+v?([0-9]+\.[0-9]+(\.[0-9]+)?)\]' | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)

            if [ -z "$VERSION" ]; then
              # Auto-increment: find latest tag and bump patch
              LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
              if [ -z "$LATEST" ]; then
                VERSION="1.0.0"
              else
                # Strip 'v' prefix and increment patch
                CURRENT="${LATEST#v}"
                MAJOR=$(echo "$CURRENT" | cut -d. -f1)
                MINOR=$(echo "$CURRENT" | cut -d. -f2)
                PATCH=$(echo "$CURRENT" | cut -d. -f3)
                PATCH=$((PATCH + 1))
                VERSION="$MAJOR.$MINOR.$PATCH"
              fi
            fi

            echo "tagged=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Will create tag v$VERSION"
          else
            echo "tagged=false" >> $GITHUB_OUTPUT
            echo "No release keyword found, skipping"
          fi

      - name: Create and push tag
        if: steps.check.outputs.tagged == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.check.outputs.version }}" -m "Release v${{ steps.check.outputs.version }}"
          git push origin "v${{ steps.check.outputs.version }}"

  build-android:
    needs: tag
    if: needs.tag.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          # Templates should already be in place for non-mono image
          ls -la /root/.local/share/godot/export_templates/ || true

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /root/release.keystore
          mkdir -p /root/.config/godot
          cat > /root/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings"]
          [resource]
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          export/android/debug_keystore = "/root/release.keystore"
          export/android/debug_keystore_user = "${{ secrets.KEYSTORE_ALIAS }}"
          export/android/debug_keystore_pass = "${{ secrets.KEYSTORE_PASSWORD }}"
          EOF

      - name: Import project
        run: |
          cd $GITHUB_WORKSPACE
          godot --headless --import 2>&1 || true
          godot --headless --import 2>&1 || true

      - name: Build APK
        run: |
          mkdir -p $GITHUB_WORKSPACE/build/android
          cd $GITHUB_WORKSPACE
          godot --headless --export-debug "Android" build/android/${EXPORT_NAME}.apk 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.tag.outputs.version }}
          name: "${{ env.EXPORT_NAME }} v${{ needs.tag.outputs.version }}"
          body: "Automated build from v${{ needs.tag.outputs.version }}"
          files: build/android/${{ env.EXPORT_NAME }}.apk
          draft: false
          prerelease: false
