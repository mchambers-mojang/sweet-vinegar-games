name: Deploy Signaling Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: server/signaling
        run: npm ci

      - name: Build TypeScript
        working-directory: server/signaling
        run: npm run build

      - name: Install production dependencies
        working-directory: server/signaling
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: carom-signaling
          publish-profile: ${{ secrets.AZURE_SIGNALING_PUBLISH_PROFILE }}
          package: server/signaling
          startup-command: 'node dist/server.js'
